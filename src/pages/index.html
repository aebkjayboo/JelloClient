<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JelloClient</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script src="../JS/theme.js"></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-drag"></div>
    <div class="traffic-lights">
      <button class="tl-btn tl-close"    id="btn-close"></button>
      <button class="tl-btn tl-minimize" id="btn-minimize"></button>
      <button class="tl-btn tl-maximize" id="btn-maximize"></button>
    </div>
    <div class="topbar-title">JelloClient</div>
    <div class="topbar-actions">
      <button class="icon-btn" id="btn-settings" title="Settings">
        <img src="../../assets/gear.png" alt="Settings">
      </button>
    </div>
  </div>

  <div class="content main-layout">

    <div class="announcement-bar" id="announcement-bar">
      <span class="announcement-label">Info</span>
      <span class="announcement-text" id="announcement-text">—</span>
    </div>

    <div class="hero">
      <h1 class="hero-title">JelloClient</h1>
      <p class="hero-sub">Ready to launch.</p>
    </div>

    <div class="action-row">
      <button class="btn btn-primary" id="btn-launch">Launch Roblox</button>
      <button class="btn btn-ghost"   id="btn-docs">Documentation</button>
    </div>

    <div class="status-line" id="status-line"></div>

    <div class="appearance-strip">
      <span class="appearance-strip-label">Appearance</span>
      <div class="appearance-strip-actions">
        <button class="btn-mode" id="btn-mode">Dark Mode</button>
        <div class="color-swatch-wrap" title="Custom accent color">
          <input type="color" id="color-picker">
          <div class="color-swatch" id="color-swatch"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="../JS/events.js"></script>
  <script>
    async function init() {
      const data = await api('/announcement')
      document.getElementById('announcement-text').textContent = data.message ?? '—'
    }

    document.getElementById('btn-launch').addEventListener('click', async () => {
      const status = document.getElementById('status-line')
      status.textContent = 'Launching…'
      const data = await api('/launch-roblox')
      status.textContent = data.message ?? ''
    })

    document.getElementById('btn-docs').addEventListener('click', async () => {
      const data = await api('/documentation')
      if (data.url) require('electron').shell.openExternal(data.url)
    })

    // ── Appearance ──────────────────────────────────────────────────────────

    const btnMode  = document.getElementById('btn-mode')
    const picker   = document.getElementById('color-picker')
    const swatch   = document.getElementById('color-swatch')

    function syncAppearanceUI() {
      const t = theme.get()
      btnMode.textContent = t.mode === 'dark' ? 'Light Mode' : 'Dark Mode'
      picker.value  = t.accent
      swatch.style.background = t.accent
    }

    btnMode.addEventListener('click', () => {
      const t = theme.get()
      theme.setMode(t.mode === 'dark' ? 'light' : 'dark')
      syncAppearanceUI()
    })

    picker.addEventListener('input', () => {
      swatch.style.background = picker.value
      const r = parseInt(picker.value.slice(1,3),16)
      const g = parseInt(picker.value.slice(3,5),16)
      const b = parseInt(picker.value.slice(5,7),16)
      document.documentElement.style.setProperty('--accent', picker.value)
      document.documentElement.style.setProperty('--accent-rgb', `${r} ${g} ${b}`)
    })

    picker.addEventListener('change', () => {
      theme.setAccent(picker.value)
      swatch.style.background = picker.value
    })

    syncAppearanceUI()
    init()
  </script>
</body>
</html>
